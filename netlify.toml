# Сборка фронта: см. package.json → "build": "vue-tsc -b && vite build"
# Выход Vite задаётся в vite.config.ts (outDir), не в корневом dist/
[build]
  command = "npm run build"
  publish = "dist/frontend/contents/panda/client"

# Storybook (site etu-storybook, ветки storybook / storybook-ui-kit).
# PWA-site (etu-report) на main использует [build] выше.
[context.storybook-ui-kit]
  command = "npm run build-storybook"
  publish = "storybook-static"

[context.storybook]
  command = "npm run build-storybook"
  publish = "storybook-static"

# Vue Router (history): прямые заходы на /auth, /disciplines/... и обновление страницы
# без этого Netlify отдаёт 404 — статика отдаётся по пути, остальное — index.html
# force = false — не подменять существующие файлы (в т.ч. /assets/*.js), иначе при 404
# на чанк можно получить index.html с MIME text/html и ошибку «Failed to load module script».
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Порядок важен: при нескольких совпадениях для одного заголовка у Netlify побеждает
# последнее правило — сначала общий no-cache для HTML/SPA, затем долгий кэш для /assets/*.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
